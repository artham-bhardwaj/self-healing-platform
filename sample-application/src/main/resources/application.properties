spring.application.name=sample-application
# Expose the health endpoint for monitoring
management.endpoints.web.exposure.include=health,info

# Show health details including components
management.endpoint.health.show-details=always
management.endpoint.health.show-components=always

# Disable caching for real-time health reporting
management.endpoint.health.cache.time-to-live=0

# Custom status aggregation order
management.health.status.order=DOWN,OUT_OF_SERVICE,DEGRADED,UP

management.endpoints.web.exposure.include=health,prometheus