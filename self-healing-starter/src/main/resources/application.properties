spring.application.name=self-healing-starter

# Actuator Endpoints Configuration
management.endpoints.web.exposure.include=health
management.endpoint.health.enabled=true

# Health Details and Aggregation
management.endpoint.health.show-details=always
management.endpoint.health.show-components=always
management.endpoint.health.cache.time-to-live=0

# Custom Status Aggregation Order (worst to best)
# Spring will select the first status it encounters from this ordered list
management.health.status.order=DOWN,OUT_OF_SERVICE,DEGRADED,UP